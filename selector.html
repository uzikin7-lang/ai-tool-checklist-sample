<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI業務キット集 30秒診断</title>
  <meta name="description" content="今いちばん減らしたい作業から、最初に使うAI業務キットを選ぶ診断ページ。">
  <link rel="canonical" href="https://uzikin7-lang.github.io/ai-tool-checklist-sample/selector.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="AI業務キット集 30秒診断">
  <meta property="og:description" content="今いちばん減らしたい作業から、最初に使うAI業務キットを選ぶ診断ページ。">
  <meta property="og:url" content="https://uzikin7-lang.github.io/ai-tool-checklist-sample/selector.html">
  <meta property="og:image" content="https://uzikin7-lang.github.io/ai-tool-checklist-sample/assets/AI_Tool_Selection_Checklist_v0.1.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    :root { --ink:#172026; --muted:#5f6b76; --line:#d8dee4; --brand:#0f766e; --accent:#b45309; --soft:#eef7f5; --paper:#fffdfa; --panel:#ffffff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:var(--paper); line-height:1.75; }
    a { color:var(--brand); font-weight:700; }
    .wrap { width:min(1120px, calc(100% - 32px)); margin:0 auto; }
    header { border-bottom:1px solid var(--line); background:linear-gradient(180deg, var(--soft), #fff); }
    .hero { display:grid; grid-template-columns:1.05fr .95fr; gap:32px; align-items:center; min-height:74vh; padding:56px 0 34px; }
    .kicker { color:var(--brand); font-weight:800; margin:0 0 10px; }
    h1 { font-size:clamp(34px, 6vw, 68px); line-height:1.06; margin:0; letter-spacing:0; max-width:900px; }
    h2 { font-size:26px; line-height:1.25; margin:0 0 18px; }
    h3 { font-size:18px; margin:0 0 8px; }
    .lead { font-size:18px; max-width:780px; color:#344054; margin:22px 0; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; }
    .button { display:inline-block; padding:12px 18px; border-radius:7px; text-decoration:none; font-weight:800; border:1px solid var(--brand); }
    .primary { background:var(--brand); color:#fff; }
    .secondary { color:var(--brand); background:#fff; }
    .ghost { border-color:var(--line); color:var(--ink); background:#fff; }
    .preview { border:1px solid var(--line); background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 10px 30px rgba(15, 23, 42, .08); }
    .preview img { width:100%; display:block; }
    section { padding:46px 0; border-bottom:1px solid var(--line); }
    .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
    .two { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:18px; }
    .card img { width:100%; border:1px solid var(--line); border-radius:6px; margin:10px 0 12px; }
    .note { color:var(--muted); font-size:14px; }
    table { width:100%; border-collapse:collapse; font-size:14px; background:#fff; }
    th,td { border:1px solid var(--line); padding:10px; text-align:left; vertical-align:top; }
    th { background:var(--brand); color:#fff; }
    ul { padding-left:1.2rem; }
    footer { padding:24px 0; color:var(--muted); font-size:13px; }
    @media (max-width:820px) { .hero,.two{grid-template-columns:1fr}.hero{min-height:auto;padding-top:38px}.grid{grid-template-columns:1fr}.actions{display:grid}.button{text-align:center} }
  </style>
</head>
<body>

  <header>
    <div class="wrap hero">
      <div>
        <p class="kicker">30秒診断</p>
        <h1>今いちばん減らしたい作業から、使うキットを選ぶ。</h1>
        <p class="lead">質問は1つだけです。今週すぐ軽くしたい作業を選ぶと、該当キットと最初に開くシートを表示します。</p>
        <div class="actions">
          <a class="button primary" href="products/AI_Workflow_Kits_Free_Bundle_v0.1.zip">10キットをまとめてダウンロード</a>
          <a class="button secondary" href="start-here.html">3分ガイドを見る</a>
        </div>
      </div>
      <div class="preview"><img src="assets/EC_FleaMarket_AI_Listing_Kit_v0.1.png" alt="EC/フリマ 商品説明AIキットのExcelプレビュー"></div>
    </div>
  </header>
  <main>
    <section>
      <div class="wrap two">
        <div>
          <h2>選んでください</h2>
          <div id="selector-options" class="grid" style="grid-template-columns:1fr; gap:10px;">
            <button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="ai-tool-checklist">AIを何に使うか決めたい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="ec-listing">商品説明や出品文を直したい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="salon">SNSから予約につなげたい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="professional-services">問い合わせ返信や相談準備を整理したい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="hiring">求人票や候補者返信を整えたい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="local-store">Googleビジネス投稿や口コミ返信を作りたい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="creator-title">YouTubeや配信のタイトルを改善したい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="monthly-report">月末の報告や振り返りを短くしたい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="line-reply">LINE公式やチャット返信を整えたい</button>
<button class="button ghost" style="text-align:left; cursor:pointer;" data-kit="invoice-followup">請求書送付や入金確認文を整えたい</button>
          </div>
        </div>
        <div class="card" id="selector-result">
          <h2>おすすめキット</h2>
          <p>左から作業を選ぶと、ここにおすすめを表示します。</p>
        </div>
      </div>
    </section>
    <script>
      const kits = [{"id":"ai-tool-checklist","title":"AI導入 90分診断キット","file":"products/AI_Tool_Selection_Checklist_v0.1.xlsx","page":"ai-tool-checklist-lp.html","promise":"毎週の手作業を棚卸しし、削減時間、月額費用、リスクを並べて、最初に試すAI化候補を1つに絞れます。","firstStep":"作業棚卸しに毎週の手作業を10個書き出す"},{"id":"ec-listing","title":"EC/フリマ 商品説明AIキット","file":"products/EC_FleaMarket_AI_Listing_Kit_v0.1.xlsx","page":"ec-listing-ai-kit.html","promise":"商品説明をAIに丸投げせず、事実確認、購入前不安、禁止表現チェックを通して安全に出品文を改善できます。","firstStep":"商品情報入力に事実だけを入力する"},{"id":"salon","title":"サロンSNS・予約導線AIキット","file":"products/Salon_SNS_Booking_AI_Kit_v0.1.xlsx","page":"salon-ai-kit.html","promise":"メニュー説明、投稿カレンダー、表現安全チェック、写真利用許可、予約導線をまとめて整えられます。","firstStep":"メニュー情報を入力する"},{"id":"professional-services","title":"士業/コンサル 問い合わせ整理AIキット","file":"products/Professional_Services_Inquiry_AI_Kit_v0.1.xlsx","page":"professional-services-ai-kit.html","promise":"専門判断をAIに任せず、相談内容の整理、振り分け、面談準備、返信下書きを安全に進められます。","firstStep":"相談内容入力で事実と未確認事項を分ける"},{"id":"hiring","title":"採用/求人票AIキット","file":"products/Hiring_Job_Posting_AI_Kit_v0.1.xlsx","page":"hiring-ai-kit.html","promise":"仕事内容、条件、向いている人、向いていない人、候補者返信、表現リスクを整理できます。","firstStep":"職種情報入力に職種、業務、条件を入力する"},{"id":"local-store","title":"地域店舗 Googleビジネス投稿AIキット","file":"products/Local_Store_GBP_AI_Kit_v0.1.xlsx","page":"local-store-ai-kit.html","promise":"Googleビジネスプロフィール投稿、FAQ、口コミ返信を、営業時間・価格・在庫の正確性を確認しながら作れます。","firstStep":"店舗情報に営業時間や注意点を入力する"},{"id":"creator-title","title":"YouTube/配信タイトル構成AIキット","file":"products/Creator_Title_Hook_AI_Kit_v0.1.xlsx","page":"creator-title-ai-kit.html","promise":"視聴者の悩み、タイトル案、冒頭15秒、サムネ文言、公開後テストを整理し、釣りすぎない企画改善ができます。","firstStep":"チャンネル情報に対象視聴者と扱うテーマを入力する"},{"id":"monthly-report","title":"月次報告AIキット","file":"products/Monthly_Report_AI_Kit_v0.1.xlsx","page":"monthly-report-ai-kit.html","promise":"売上、作業時間、問い合わせ、出来事、来月の打ち手を分けて入力し、AIに月次報告の下書きを安全に作らせられます。","firstStep":"月次入力に数字と出来事を入れる"},{"id":"line-reply","title":"LINE公式返信AIキット","file":"products/LINE_Official_Reply_AI_Kit_v0.1.xlsx","page":"line-reply-ai-kit.html","promise":"問い合わせ内容、予約条件、FAQ、返信文、送信前チェック、履歴ログを分けて、AIで返信を下書きする前の抜け漏れを減らせます。","firstStep":"返信受付に問い合わせ内容と急ぎ度を入力する"},{"id":"invoice-followup","title":"請求・入金確認AIキット","file":"products/Invoice_Payment_Followup_AI_Kit_v0.1.xlsx","page":"invoice-followup-ai-kit.html","promise":"請求番号、金額、期日、送付状況、相手との関係を分けて、AIで入金確認文を下書きする前の誤送信を減らせます。","firstStep":"請求情報に請求番号、金額、期日、入金状況を入力する"}];
      const byId = new Map(kits.map((kit) => [kit.id, kit]));
      const result = document.getElementById("selector-result");
      document.getElementById("selector-options").addEventListener("click", (event) => {
        const button = event.target.closest("[data-kit]");
        if (!button) return;
        const kit = byId.get(button.dataset.kit);
        result.innerHTML = `
          <h2>${kit.title}</h2>
          <p>${kit.promise}</p>
          <p><strong>最初にやること:</strong><br>${kit.firstStep}</p>
          <div class="actions">
            <a class="button primary" href="${kit.file}">Excelを開く</a>
            <a class="button secondary" href="${kit.page}">詳細を見る</a>
          </div>
        `;
      });
    </script>
  </main>

    <div>AI業務キット集 / 2026-05-13 / 投資助言・収益保証ではありません。</div>
  </div>
</footer>
</body>
</html>
